# Lefthook Git Hooks Configuration
# https://github.com/evilmartians/lefthook

pre-commit:
  parallel: true
  commands:
    lint:
      glob: '*.{ts,tsx,js,jsx}'
      run: yarn lint:fix {staged_files} && git add {staged_files}
    format:
      glob: '*.{ts,tsx,js,jsx,json,css,md}'
      run: yarn format {staged_files} && git add {staged_files}
    knip:
      run: yarn check:deps

commit-msg:
  commands:
    commitlint:
      run: npx commitlint --edit {1}

pre-push:
  commands:
    check-types:
      run: yarn check:types
